{% extends "pages/base.html" %}

{% block content %}
<section  id="app" class="backdrop container-fluid">
  {% include "pages/_breadcrumbs.html" %}
  <div class="row">
    <div class="col-12">
      <div class="tab-pane active in">
        <div class="tab-content">
          <div class="card panel-grey panel-cartitem over-radius">
            <div class="card-body">
              <div class="mt-4">
                <h1>Practices</h1>
              </div>
              <editables-list inline-template>
                <div>
                  <div class="text-right">
                    <a id="new-page" class="btn btn-primary btn-block" href="#new-pageelement" data-toggle="modal" data-target="#new-pageelement">New practice</a>
                  </div>
                  <!-- modal to create a new page -->
                  <div id="new-pageelement" class="modal fade"
                       tabindex="-1" role="dialog"
                       aria-labelledby="Create a page" aria-hidden="true" style="color: #000;">
                    <div class="modal-dialog">
                      <form class="modal-content"
                            @submit.prevent="create($event)">
                        <div class="modal-header">
                          <h4 class="modal-title">Create a new practice ...</h4>
                          <button type="button"
                                  class="close"
                                  data-dismiss="modal"
                                  aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                          </button>
                        </div>
                        <div class="modal-body">
                          <label class="form-label">
                            Title
                          </label>
                          <input class="form-control w-100"
                                 type="text" name="title" placeholder="Title"
                                 v-model="newItem.title">
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary"
                                  data-dismiss="modal">Cancel</button>
                          <button type="submit" class="btn btn-primary">Create</button>
                        </div>
                      </form>
                    </div>
                  </div>
                  <!-- end modal to create a new page -->
                  {# show loading spinner #}
                  <div v-if="!itemsLoaded">
                    <i class="fa fa-refresh fa-spin"></i>
                  </div>
                  {# show empty #}
                  <div v-show="itemsLoaded && items.results.length == 0" v-cloak>
                    <h3 class="text-center"><em>No entries <span v-show="params.q"> [[params.q]]</span></em></h3>
                  </div>
                  {# show non-empty list #}
                  <div v-show="itemsLoaded && items.results.length > 0">
                    <div v-for="item in items.results">
                      <a :href="item.path.substr(1) + '/'">[[item.title]]</a>
                    </div>
                  </div>
                </div>
              </editables-list>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
